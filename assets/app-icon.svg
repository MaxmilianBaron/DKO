<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title">
  <title id="title">DKO — Digitální kontrola objektů</title>
  <defs>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17b9fe"/>
      <stop offset="1" stop-color="#086afa"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="#fff"/>
  <rect x="1" y="1" width="510" height="510" rx="108" fill="url(#blue)"/>
  <g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <path d="M130 390 Q256 365 382 390" stroke-width="15"/>
    <path d="M165 355 V187 L256 148 L347 205 V355" stroke-width="17"/>
  </g>
  <g fill="#fff" filter="url(#glow)">
    <rect x="210" y="220" width="15" height="27" rx="7"/>
    <rect x="286" y="220" width="15" height="27" rx="7"/>
    <rect x="210" y="273" width="15" height="27" rx="7"/>
    <rect x="286" y="273" width="15" height="27" rx="7"/>
    <rect x="210" y="326" width="15" height="27" rx="7"/>
    <rect x="286" y="326" width="15" height="27" rx="7"/>
  </g>
</svg>
